# KNN base learner configurations.

geo:
  # Full numeric-feature KNN. k=15 distance-weighted Euclidean.
  n_neighbors: 15
  weights: distance
  metric: minkowski
  p: 2
  n_jobs: -1

lean:
  # Geo + size only KNN. Larger k smooths over the smaller feature space.
  n_neighbors: 25
  weights: distance
  metric: minkowski
  p: 2
  n_jobs: -1
  feature_subset:
    - latitude
    - longitude
    - dist_buckhead_km
    - dist_midtown_km
    - dist_downtown_km
    - dist_min_landmark_km
    - sqft
    - beds
    - baths
    - property_age
    - sub_market_te
    - zipcode_te
    - subm_psf_median
    - zip_psf_median
