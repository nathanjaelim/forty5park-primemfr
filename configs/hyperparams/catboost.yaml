# CatBoost training configuration.
#
# `fixed` is the static base; `tuned` is overlaid from
# artifacts/best_catboost_params.json (50-trial Optuna study).

fixed:
  iterations: 3000
  learning_rate: 0.04
  depth: 7
  l2_leaf_reg: 3.0
  bagging_temperature: 1.0
  random_strength: 1.0
  min_data_in_leaf: 20
  od_type: Iter
  od_wait: 100
  verbose: false
  allow_writing_files: false
  loss_function: "Quantile:alpha=0.5"
  eval_metric: MAE
